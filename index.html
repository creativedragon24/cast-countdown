<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cast Countdown 🦴</title>
  <style>
    /* ──────────────────────────────────────
       GLOBAL
    ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --card: #1a1a24;
      --accent: #7b61ff;
      --accent2: #ff6b6b;
      --accent3: #43e97b;
      --accent4: #f7971e;
      --text: #f0f0f5;
      --muted: #8888aa;
      --border: #2a2a3a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ──────────────────────────────────────
       SCREEN 1 — INPUT
    ────────────────────────────────────── */
    #screen-input {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      background: radial-gradient(ellipse at 50% 0%, #1e1040 0%, #0f0f13 70%);
    }

    .input-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.8rem 2.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 0 60px #7b61ff22;
    }

    .input-card h1 {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 0.3rem;
      letter-spacing: -0.5px;
    }

    .input-card h1 span { color: var(--accent); }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.4rem;
    }

    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.45rem;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: #12121c;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
    }

    .field select option { background: #1a1a24; }

    .field textarea { resize: vertical; min-height: 70px; }

    .btn-go {
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-go:hover { background: #6247e0; transform: translateY(-1px); }
    .btn-go:active { transform: translateY(0); }

    .bone-icon {
      font-size: 3rem;
      text-align: center;
      margin-bottom: 0.6rem;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    /* ──────────────────────────────────────
       SCREEN 2 — STATS
    ────────────────────────────────────── */
    #screen-stats {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    /* HERO BANNER */
    .hero {
      width: 100%;
      background: radial-gradient(ellipse at 50% 0%, #1e1040 0%, #0f0f13 70%);
      text-align: center;
      padding: 3rem 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .hero-greeting {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero-title {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .hero-title span { color: var(--accent); }

    /* COUNTDOWN RING */
    .countdown-wrap {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.2rem;
    }

    .cd-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.7rem 1.2rem;
      min-width: 80px;
      text-align: center;
    }

    .cd-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      display: block;
      line-height: 1;
    }

    .cd-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.2rem;
    }

    /* PROGRESS BAR */
    .progress-section {
      width: 100%;
      max-width: 640px;
      margin: 1.5rem auto 0;
      padding: 0 1.5rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .progress-bar-bg {
      width: 100%;
      height: 10px;
      background: #2a2a3a;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      border-radius: 99px;
      transition: width 0.6s ease;
    }

    /* SCROLL CONTENT */
    .scroll-content {
      width: 100%;
      max-width: 680px;
      padding: 2.5rem 1.2rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    /* STAT CARD */
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.5rem 1.8rem;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .stat-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      border-radius: 4px 0 0 4px;
    }

    .accent-purple::before  { background: var(--accent); }
    .accent-red::before     { background: var(--accent2); }
    .accent-green::before   { background: var(--accent3); }
    .accent-orange::before  { background: var(--accent4); }
    .accent-blue::before    { background: #38bdf8; }
    .accent-pink::before    { background: #f472b6; }

    .stat-icon {
      font-size: 1.8rem;
      margin-bottom: 0.4rem;
    }

    .stat-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .stat-value {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .stat-desc {
      margin-top: 0.5rem;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.55;
    }

    /* FACT CARD */
    .fact-card {
      background: linear-gradient(135deg, #1a1a24 0%, #1e1040 100%);
      border: 1px solid #7b61ff44;
      border-radius: 18px;
      padding: 1.5rem 1.8rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .fact-card.visible { opacity: 1; transform: translateY(0); }

    .fact-emoji { font-size: 2rem; flex-shrink: 0; margin-top: 0.1rem; }

    .fact-content h3 {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .fact-content p {
      font-size: 0.95rem;
      color: #ccc;
      line-height: 1.6;
    }

    /* SECTION DIVIDER */
    .section-header {
      text-align: center;
      padding: 0.5rem 0;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .section-header.visible { opacity: 1; transform: translateY(0); }

    .section-header h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .section-header .line {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 0.4rem auto 0;
      border-radius: 2px;
    }

    /* RESET BTN */
    .reset-btn {
      margin: 2rem auto;
      display: block;
      padding: 0.75rem 2rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* CONFETTI / CELEBRATION */
    .celebration {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #0f0f13ee;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .celebration.show { display: flex; }

    .celebration h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      color: var(--accent3);
      margin-bottom: 1rem;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }

    .celebration p { color: var(--muted); font-size: 1.1rem; }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .confetti-strip {
      display: flex;
      gap: 0.5rem;
      font-size: 2rem;
      margin-bottom: 1.5rem;
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      0%   { transform: rotate(-5deg); }
      50%  { transform: rotate(5deg); }
      100% { transform: rotate(-5deg); }
    }

    /* RESPONSIVE */
    @media (max-width: 420px) {
      .input-card { padding: 2rem 1.3rem; }
      .cd-num { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════
     SCREEN 1 — INPUT
════════════════════════════════════════ -->
<section id="screen-input">
  <div class="input-card">
    <div class="bone-icon">🦴</div>
    <h1>Cast <span>Countdown</span></h1>
    <p class="subtitle">Turn your recovery into a real-time adventure</p>

    <div class="field">
      <label>📅 Date Cast Was Applied</label>
      <input type="date" id="cast-start" />
    </div>

    <div class="field">
      <label>📅 Date Cast Will Be Removed</label>
      <input type="date" id="cast-end" />
    </div>

    <div class="field">
      <label>🦴 Which Bone Did You Break?</label>
      <select id="bone-type">
        <option value="">— select bone —</option>
        <option value="Radius (Wrist)">Radius (Wrist)</option>
        <option value="Ulna (Forearm)">Ulna (Forearm)">Ulna (Forearm)</option>
        <option value="Humerus (Upper Arm)">Humerus (Upper Arm)</option>
        <option value="Tibia (Shin)">Tibia (Shin)</option>
        <option value="Fibula (Lower Leg)">Fibula (Lower Leg)</option>
        <option value="Femur (Thigh)">Femur (Thigh)</option>
        <option value="Clavicle (Collarbone)">Clavicle (Collarbone)</option>
        <option value="Metatarsal (Foot)">Metatarsal (Foot)</option>
        <option value="Phalanx (Finger/Toe)">Phalanx (Finger/Toe)</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="field">
      <label>⚡ Fracture Type</label>
      <select id="fracture-type">
        <option value="">— select type —</option>
        <option value="Hairline">Hairline</option>
        <option value="Stress">Stress</option>
        <option value="Simple (Clean Break)">Simple (Clean Break)</option>
        <option value="Comminuted (Multiple Pieces)">Comminuted (Multiple Pieces)</option>
        <option value="Compound (Open)">Compound (Open)</option>
        <option value="Greenstick">Greenstick</option>
        <option value="Avulsion">Avulsion</option>
      </select>
    </div>

    <div class="field">
      <label>👤 Your Name (optional)</label>
      <input type="text" id="user-name" placeholder="e.g. Alex" maxlength="30" />
    </div>

    <button class="btn-go" onclick="startStats()">Let's See My Stats →</button>
  </div>
</section>

<!-- ════════════════════════════════════════
     CELEBRATION OVERLAY
════════════════════════════════════════ -->
<div class="celebration" id="celebration">
  <div class="confetti-strip">🎉🦴🎊🩹🎉🦴🎊</div>
  <h1>Cast Day! 🎉</h1>
  <p>Today is the day your cast comes off!<br>You did it — you're officially healed!</p>
  <button class="btn-go" style="margin-top:2rem;max-width:220px" onclick="document.getElementById('celebration').classList.remove('show')">
    See My Journey →
  </button>
</div>

<!-- ════════════════════════════════════════
     SCREEN 2 — STATS
════════════════════════════════════════ -->
<section id="screen-stats">

  <!-- STICKY HERO -->
  <div class="hero">
    <p class="hero-greeting">🩹 Your Recovery Journey</p>
    <h1 class="hero-title" id="hero-title">Cast <span>Countdown</span></h1>
    <div class="countdown-wrap" id="countdown-wrap">
      <div class="cd-block"><span class="cd-num" id="cd-days">--</span><div class="cd-label">Days</div></div>
      <div class="cd-block"><span class="cd-num" id="cd-hours">--</span><div class="cd-label">Hours</div></div>
      <div class="cd-block"><span class="cd-num" id="cd-mins">--</span><div class="cd-label">Minutes</div></div>
      <div class="cd-block"><span class="cd-num" id="cd-secs">--</span><div class="cd-label">Seconds</div></div>
    </div>
    <div class="progress-section">
      <div class="progress-label">
        <span>Cast Applied</span>
        <span id="pct-label">0% healed</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- SCROLLING CONTENT -->
  <div class="scroll-content" id="scroll-content">
    <!-- cards injected by JS -->
  </div>

  <button class="reset-btn" onclick="resetApp()">← Start Over</button>
</section>

<script>
/* ════════════════════════════════════════
   DATA
════════════════════════════════════════ */
const FACTS = [
  {
    emoji: "🔬",
    title: "How Bones Heal",
    text: "Bone healing happens in 4 stages: inflammation (days 1–5), soft callus formation (week 1–3), hard callus formation (week 3–12), and bone remodelling which can take up to 2 years after that!"
  },
  {
    emoji: "🩸",
    title: "Nature's First Responder",
    text: "Within minutes of a fracture, your body forms a blood clot called a fracture haematoma around the break — this is the very first step of healing and is totally normal."
  },
  {
    emoji: "💪",
    title: "Bone is Living Tissue",
    text: "Your bones are alive! They contain osteoblasts (bone builders) and osteoclasts (bone removers) that constantly remodel bone tissue — especially active right now during your recovery."
  },
  {
    emoji: "🧲",
    title: "Electrical Signals Speed Healing",
    text: "Bone generates small electrical signals when under mechanical stress — a property called piezoelectricity. This is one reason gentle movement (once approved) can actually speed up bone healing."
  },
  {
    emoji: "🥛",
    title: "Calcium is Your Best Friend",
    text: "Your body needs extra calcium and Vitamin D right now. Dairy, leafy greens, almonds, and sunlight all help. Bones that heal with adequate calcium are denser and stronger."
  },
  {
    emoji: "🚫",
    title: "Smoking Slows Healing",
    text: "Studies show smokers take up to 30% longer to heal fractures. Nicotine restricts blood flow to the healing site, slowing down the delivery of nutrients and oxygen your bone needs."
  },
  {
    emoji: "🦕",
    title: "Dinosaur Fact",
    text: "Healed fractures have been found in dinosaur fossils — meaning broken bones and recovery is as old as life on land! A T-Rex fibula healed fracture was documented in the fossil record."
  },
  {
    emoji: "⚡",
    title: "Bones Can Become STRONGER",
    text: "Wolff's Law states that bone remodels in response to stress. A properly healed fracture site can become denser and harder than the original bone — you might come out stronger!"
  },
  {
    emoji: "🏥",
    title: "Cast History",
    text: "Plaster of Paris casts were first used medically in the 1800s. Modern fibreglass casts weren't introduced until the 1970s — lighter, waterproof, and much cooler (literally, they don't heat up as much)."
  },
  {
    emoji: "🧬",
    title: "Your Stem Cells Are Working",
    text: "A special type of stem cell called a mesenchymal stem cell is activated by your fracture. These incredible cells can transform into bone, cartilage, or fat depending on what your body needs."
  },
  {
    emoji: "🌡️",
    title: "The Healing Site Gets Hot",
    text: "It's completely normal for the area around a fracture to feel warm. Your immune system ramps up blood flow to deliver healing materials — this metabolic activity generates heat."
  },
  {
    emoji: "🎯",
    title: "Protein Matters Too",
    text: "About 35% of bone mass is protein (mainly collagen). Eating adequate protein — eggs, chicken, beans, fish — helps your body build the collagen scaffold that new bone forms around."
  },
];

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let timerInterval = null;
let userData = {};

/* ════════════════════════════════════════
   START
════════════════════════════════════════ */
function startStats() {
  const startVal = document.getElementById('cast-start').value;
  const endVal   = document.getElementById('cast-end').value;
  const bone     = document.getElementById('bone-type').value;
  const fracture = document.getElementById('fracture-type').value;
  const name     = document.getElementById('user-name').value.trim();

  if (!startVal || !endVal) {
    alert('Please fill in both the cast start and removal dates! 📅');
    return;
  }

  const startDate = new Date(startVal);
  const endDate   = new Date(endVal);
  endDate.setHours(23, 59, 59);

  if (endDate <= startDate) {
    alert('Cast removal date must be after the application date!');
    return;
  }

  userData = { startDate, endDate, bone, fracture, name };

  // Check if today is cast-off day or past
  const now = new Date();
  const removeDay = new Date(endVal);
  removeDay.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);

  // Switch screens
  document.getElementById('screen-input').style.display = 'none';
  const statsEl = document.getElementById('screen-stats');
  statsEl.style.display = 'flex';

  // Set hero title
  const displayName = name ? `${name}'s` : 'Your';
  document.getElementById('hero-title').innerHTML =
    `${displayName} <span>Cast Countdown</span>`;

  // Build scrolling cards
  buildCards();

  // Start live countdown
  updateCountdown();
  timerInterval = setInterval(updateCountdown, 1000);

  // Celebration?
  if (today >= removeDay) {
    setTimeout(() => document.getElementById('celebration').classList.add('show'), 600);
  }

  // Animate cards on scroll
  setupScrollObserver();
}

/* ════════════════════════════════════════
   BUILD CARDS
════════════════════════════════════════ */
function buildCards() {
  const container = document.getElementById('scroll-content');
  container.innerHTML = '';

  const { startDate, endDate, bone, fracture, name } = userData;
  const totalMs  = endDate - startDate;
  const totalDays = Math.ceil(totalMs / 86400000);
  const now       = new Date();
  const elapsed   = Math.max(0, now - startDate);
  const elapsedDays = Math.floor(elapsed / 86400000);
  const remaining   = Math.max(0, endDate - now);
  const remainDays  = Math.ceil(remaining / 86400000);

  const boneName     = bone     || 'your bone';
  const fractureType = fracture || 'your fracture';

  // ── Healing progress stats ──────────────────
  const pct = Math.min(100, Math.round((elapsed / totalMs) * 100));

  const stats = [
    {
      accent: 'accent-purple',
      icon: '📆',
      label: 'Total Recovery Time',
      valueId: null,
      value: `${totalDays} days`,
      desc: `That's ${Math.round(totalDays/7)} weeks of your body doing incredible repair work on your ${boneName}.`
    },
    {
      accent: 'accent-green',
      icon: '⏳',
      label: 'Days in the Cast So Far',
      valueId: null,
      value: `${elapsedDays} days`,
      desc: `You've already powered through ${elapsedDays} of ${totalDays} days — that's ${pct}% of your journey done!`
    },
    {
      accent: 'accent-orange',
      icon: '🔥',
      label: 'Hours of Active Healing',
      valueId: 'stat-hours',
      value: '',
      desc: `Your osteoblasts have been working non-stop, 24 hours a day, since day one. They never clock out!`,
      live: () => {
        const h = Math.floor((new Date() - startDate) / 3600000);
        return h.toLocaleString() + ' hrs';
      }
    },
    {
      accent: 'accent-red',
      icon: '💓',
      label: 'Heartbeats Since Cast Applied',
      valueId: 'stat-heartbeats',
      value: '',
      desc: `Your heart pumps nutrient-rich blood to your healing fracture with every single beat.`,
      live: () => {
        const secs = (new Date() - startDate) / 1000;
        return Math.round(secs * 1.1667).toLocaleString(); // ~70 bpm
      }
    },
    {
      accent: 'accent-blue',
      icon: '🫁',
      label: 'Breaths Since Cast Applied',
      valueId: 'stat-breaths',
      value: '',
      desc: `Every breath brings oxygen to your bloodstream — which gets delivered to your healing bone.`,
      live: () => {
        const secs = (new Date() - startDate) / 1000;
        return Math.round(secs * 0.267).toLocaleString(); // ~16 breaths/min
      }
    },
    {
      accent: 'accent-pink',
      icon: '🧱',
      label: 'New Bone Cells Created (est.)',
      valueId: 'stat-cells',
      value: '',
      desc: `Your body generates roughly 2 million blood/bone cells per second — many are dedicated to your ${boneName} repair right now.`,
      live: () => {
        const secs = Math.max(0, (new Date() - startDate) / 1000);
        return (Math.round(secs * 2000000)).toLocaleString();
      }
    },
    {
      accent: 'accent-purple',
      icon: '😴',
      label: 'Hours of Sleep for Recovery',
      valueId: null,
      value: `~${Math.round(elapsedDays * 8)} hrs`,
      desc: `Sleep is when most bone repair happens — growth hormone peaks during deep sleep and drives osteoblast activity.`
    },
    {
      accent: 'accent-green',
      icon: '🎯',
      label: 'Healing Stage Right Now',
      valueId: null,
      value: getHealingStage(elapsedDays),
      desc: getHealingStageDesc(elapsedDays)
    },
    {
      accent: 'accent-orange',
      icon: '📏',
      label: 'Fracture Type',
      valueId: null,
      value: fractureType,
      desc: getFractureDesc(fracture)
    },
  ];

  // Inject stat cards
  addSectionHeader(container, '📊 Your Healing Stats');
  stats.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = `stat-card ${s.accent}`;
    div.style.transitionDelay = `${i * 0.05}s`;
    div.innerHTML = `
      <div class="stat-icon">${s.icon}</div>
      <div class="stat-label">${s.label}</div>
      <div class="stat-value" ${s.valueId ? `id="${s.valueId}"` : ''}>${s.value}</div>
      <p class="stat-desc">${s.desc}</p>`;
    container.appendChild(div);
  });

  // Inject fact cards
  addSectionHeader(container, '🧠 Did You Know?');
  FACTS.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'fact-card';
    div.style.transitionDelay = `${i * 0.05}s`;
    div.innerHTML = `
      <div class="fact-emoji">${f.emoji}</div>
      <div class="fact-content">
        <h3>${f.title}</h3>
        <p>${f.text}</p>
      </div>`;
    container.appendChild(div);
  });

  // Store live updaters
  window._liveStats = stats.filter(s => s.live && s.valueId);
}

function addSectionHeader(container, title) {
  const div = document.createElement('div');
  div.className = 'section-header';
  div.innerHTML = `<h2>${title}</h2><div class="line"></div>`;
  container.appendChild(div);
}

/* ════════════════════════════════════════
   HEALING STAGE LOGIC
════════════════════════════════════════ */
function getHealingStage(days) {
  if (days <= 5)  return 'Stage 1 — Inflammation';
  if (days <= 21) return 'Stage 2 — Soft Callus';
  if (days <= 84) return 'Stage 3 — Hard Callus';
  return 'Stage 4 — Bone Remodelling';
}

function getHealingStageDesc(days) {
  if (days <= 5)  return 'Your immune system is flooding the area with healing cells. Some pain and swelling is normal — it means it\'s working!';
  if (days <= 21) return 'A soft, cartilage-like material is bridging the fracture gap. The ends are becoming more stable every day.';
  if (days <= 84) return 'The soft callus is being replaced with hard, mineralised bone tissue. You\'re building real bone right now!';
  return 'The fracture is healed but your bone is still fine-tuning its structure — remodelling can continue for up to 2 years.';
}

function getFractureDesc(type) {
  const map = {
    'Hairline':               'A tiny crack in the bone — often from overuse or stress. Heals well with rest.',
    'Stress':                 'A small crack caused by repetitive force. Common in athletes and very responsive to rest.',
    'Simple (Clean Break)':   'The bone broke in one clean line with no displacement. One of the most straightforward to heal.',
    'Comminuted (Multiple Pieces)': 'The bone shattered into several pieces. Requires careful immobilisation — you\'re doing great!',
    'Compound (Open)':        'The bone broke through the skin. Healed under expert medical care — your resilience is remarkable.',
    'Greenstick':             'A partial fracture where the bone bends and cracks — common in children due to softer bones.',
    'Avulsion':               'A fragment of bone was pulled away by a tendon or ligament. A unique but fully healable fracture.'
  };
  return map[type] || 'Every fracture is unique, and yours is healing in its own amazing way.';
}

/* ════════════════════════════════════════
   LIVE COUNTDOWN
════════════════════════════════════════ */
function updateCountdown() {
  const now  = new Date();
  const diff = userData.endDate - now;

  // Update progress bar
  const total   = userData.endDate - userData.startDate;
  const elapsed = now - userData.startDate;
  const pct     = Math.min(100, Math.max(0, (elapsed / total) * 100));
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('pct-label').textContent = Math.round(pct) + '% healed';

  if (diff <= 0) {
    // Past removal date
    document.getElementById('cd-days').textContent  = '0';
    document.getElementById('cd-hours').textContent = '0';
    document.getElementById('cd-mins').textContent  = '0';
    document.getElementById('cd-secs').textContent  = '0';
    clearInterval(timerInterval);
  } else {
    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins  = Math.floor((diff % 3600000)  / 60000);
    const secs  = Math.floor((diff % 60000)    / 1000);
    document.getElementById('cd-days').textContent  = days;
    document.getElementById('cd-hours').textContent = String(hours).padStart(2,'0');
    document.getElementById('cd-mins').textContent  = String(mins).padStart(2,'0');
    document.getElementById('cd-secs').textContent  = String(secs).padStart(2,'0');
  }

  // Update live stat cards
  if (window._liveStats) {
    window._liveStats.forEach(s => {
      const el = document.getElementById(s.valueId);
      if (el) el.textContent = s.live();
    });
  }
}

/* ════════════════════════════════════════
   SCROLL OBSERVER (animate cards in)
════════════════════════════════════════ */
function setupScrollObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.stat-card, .fact-card, .section-header')
          .forEach(el => observer.observe(el));
}

/* ════════════════════════════════════════
   RESET
════════════════════════════════════════ */
function resetApp() {
  clearInterval(timerInterval);
  document.getElementById('screen-stats').style.display = 'none';
  document.getElementById('screen-input').style.display = 'flex';
  document.getElementById('scroll-content').innerHTML = '';
}
</script>
